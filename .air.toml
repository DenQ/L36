root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Указываем путь к нашему перемещенному main.go
  cmd = "go build -o ./tmp/main ./cmd/l36/main.go"
  # Как запускать скомпилированный файл
  bin = "./tmp/main"
  # Какие расширения отслеживать
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  # Какие папки игнорировать (bin нам не нужен в прослушке)
  exclude_dir = ["assets", "tmp", "vendor", "bin"]
  # Задержка перед ребилдом
  delay = 300
  # Останавливать старый билд при ошибке нового
  stop_on_error = true

[log]
  time = true
